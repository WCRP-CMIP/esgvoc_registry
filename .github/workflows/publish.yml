name: Publish DB

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: "Project ID (e.g. cmip7, universe, cmip6)"
        required: true
        type: string
      bump_type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - dev-latest
      universe_version:
        description: "Universe version embedded in this DB (blank = auto-resolve latest stable from universe.json)"
        required: false
        type: string
        default: ""
      project_repo:
        description: "Project CV repo  owner/repo  (leave blank for universe-only build)"
        required: false
        type: string
        default: ""
      project_ref:
        description: "Branch / tag of the project repo to build from"
        required: false
        type: string
        default: "main"
      universe_repo:
        description: "Universe repo  owner/repo"
        required: false
        type: string
        default: "WCRP-CMIP/WCRP-universe"
      universe_ref:
        description: "Branch / tag of the universe repo"
        required: false
        type: string
        default: "esgvoc"
      esgvoc_ref:
        description: "esgvoc branch/tag to install (default: esgvoc)"
        required: false
        type: string
        default: "esgvoc"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create releases + push index file

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout this registry repo (so we can update the JSON index)
      # -----------------------------------------------------------------------
      - name: Checkout registry repo
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # 2. Install Python + uv + esgvoc
      # -----------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install esgvoc
        run: |
          uv pip install --system "esgvoc>=4.0.0"

      # -----------------------------------------------------------------------
      # 3. Resolve version from bump type + index JSON
      # -----------------------------------------------------------------------
      - name: Resolve version
        id: version
        run: |
          set -e
          PROJECT_ID="${{ inputs.project_id }}"
          BUMP_TYPE="${{ inputs.bump_type }}"
          INDEX_FILE="${PROJECT_ID}.json"

          CV_VERSION=$(python3 - <<PYEOF
          import json, sys

          bump = "${BUMP_TYPE}"
          if bump == "dev-latest":
              print("dev-latest")
              sys.exit(0)

          # Find latest stable version from index
          try:
              with open("${INDEX_FILE}") as f:
                  idx = json.load(f)
          except FileNotFoundError:
              # No index yet — start at 1.0.0
              if bump == "major":
                  print("1.0.0")
              elif bump == "minor":
                  print("0.1.0")
              else:
                  print("0.0.1")
              sys.exit(0)

          latest = None
          for r in idx["releases"]:
              v = r.get("version", "")
              if v == "dev-latest" or r.get("is_prerelease"):
                  continue
              # Strip legacy v prefix
              v = v.lstrip("v")
              try:
                  parts = [int(x) for x in v.split(".")]
                  if len(parts) == 3:
                      latest = parts
                      break
              except ValueError:
                  continue

          if latest is None:
              latest = [0, 0, 0]

          major, minor, patch = latest
          if bump == "major":
              major += 1; minor = 0; patch = 0
          elif bump == "minor":
              minor += 1; patch = 0
          else:
              patch += 1

          print(f"{major}.{minor}.{patch}")
          PYEOF
          )

          # Auto-resolve universe_version if not provided
          UNIVERSE_VERSION="${{ inputs.universe_version }}"
          if [ -z "${UNIVERSE_VERSION}" ]; then
            if [ "${PROJECT_ID}" = "universe" ]; then
              UNIVERSE_VERSION="${CV_VERSION}"
            else
              UNIVERSE_VERSION=$(python3 -c "
          import json
          with open('universe.json') as f:
              idx = json.load(f)
          for r in idx['releases']:
              v = r.get('version', '')
              if v != 'dev-latest' and not r.get('is_prerelease'):
                  print(v); break
          ")
            fi
          fi

          IS_PRE="false"
          if [ "${BUMP_TYPE}" = "dev-latest" ]; then
            IS_PRE="true"
          fi

          echo "cv_version=${CV_VERSION}"           >> "$GITHUB_OUTPUT"
          echo "universe_version=${UNIVERSE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=${IS_PRE}"             >> "$GITHUB_OUTPUT"

          echo "Resolved: project=${PROJECT_ID} version=${CV_VERSION} universe=${UNIVERSE_VERSION} prerelease=${IS_PRE}"

      # -----------------------------------------------------------------------
      # 4. Build the DB
      # -----------------------------------------------------------------------
      - name: Build DB
        id: build
        run: |
          set -e
          PROJECT_ID="${{ inputs.project_id }}"
          CV_VERSION="${{ steps.version.outputs.cv_version }}"
          UNIVERSE_VERSION="${{ steps.version.outputs.universe_version }}"
          OUTPUT="${PROJECT_ID}.db"

          if [ "${PROJECT_ID}" = "universe" ]; then
            # Universe-only build — dedicated command
            esgvoc admin build-universe \
              --universe-repo     "${{ inputs.universe_repo }}" \
              --universe-ref      "${{ inputs.universe_ref }}" \
              --universe-version  "${CV_VERSION}" \
              --output            "${OUTPUT}"
          else
            # Project build (clones both repos)
            esgvoc admin build \
              --project-repo     "${{ inputs.project_repo }}" \
              --project-ref      "${{ inputs.project_ref }}" \
              --universe-repo    "${{ inputs.universe_repo }}" \
              --universe-ref     "${{ inputs.universe_ref }}" \
              --project-id       "${PROJECT_ID}" \
              --cv-version       "${CV_VERSION}" \
              --universe-version "${UNIVERSE_VERSION}" \
              --output           "${OUTPUT}"
          fi

          # Compute checksum and size
          SHA256=$(sha256sum "${OUTPUT}" | awk '{print $1}')
          SIZE=$(stat -c%s "${OUTPUT}")
          echo "output=${OUTPUT}"        >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA256}"        >> "$GITHUB_OUTPUT"
          echo "size=${SIZE}"            >> "$GITHUB_OUTPUT"
          echo "project_id=${PROJECT_ID}" >> "$GITHUB_OUTPUT"
          echo "cv_version=${CV_VERSION}" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # 5. Validate the DB
      # -----------------------------------------------------------------------
      - name: Validate DB
        run: esgvoc admin validate "${{ steps.build.outputs.output }}"

      # -----------------------------------------------------------------------
      # 6. Create / update GitHub Release and upload DB asset
      # -----------------------------------------------------------------------
      - name: Publish release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          PROJECT_ID="${{ steps.build.outputs.project_id }}"
          CV_VERSION="${{ steps.build.outputs.cv_version }}"
          TAG="${PROJECT_ID}.${CV_VERSION}"
          DB_FILE="${{ steps.build.outputs.output }}"
          SHA256="${{ steps.build.outputs.sha256 }}"
          SIZE="${{ steps.build.outputs.size }}"
          IS_PRE="${{ steps.version.outputs.is_prerelease }}"

          PRE_FLAG=""
          if [ "${IS_PRE}" = "true" ]; then
            PRE_FLAG="--prerelease"
          fi

          RELEASE_NOTES="## ${PROJECT_ID} ${CV_VERSION}

          - **Universe version:** ${{ steps.version.outputs.universe_version }}
          - **Checksum (SHA-256):** \`${SHA256}\`
          - **Size:** ${SIZE} bytes
          - **Built with esgvoc:** \`${{ inputs.esgvoc_ref }}\`

          \`\`\`
          esgvoc use ${PROJECT_ID}@${CV_VERSION}
          \`\`\`"

          # Delete existing release with this tag if it exists (idempotent)
          gh release delete "${TAG}" --yes 2>/dev/null || true
          git push origin ":refs/tags/${TAG}" 2>/dev/null || true

          # Rename to canonical asset name before upload
          ASSET="${PROJECT_ID}-${CV_VERSION}.db"
          mv "${DB_FILE}" "${ASSET}"

          # Create release
          gh release create "${TAG}" \
            --title "${PROJECT_ID} ${CV_VERSION}" \
            --notes "${RELEASE_NOTES}" \
            ${PRE_FLAG} \
            "${ASSET}"

          # Direct download URL (stable GitHub release asset format)
          DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${ASSET}"

          echo "tag=${TAG}"                    >> "$GITHUB_OUTPUT"
          echo "download_url=${DOWNLOAD_URL}"  >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # 7. Update the per-project JSON index on main
      # -----------------------------------------------------------------------
      - name: Update index JSON
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          PROJECT_ID="${{ steps.build.outputs.project_id }}"
          CV_VERSION="${{ steps.build.outputs.cv_version }}"
          TAG="${{ steps.release.outputs.tag }}"
          SHA256="${{ steps.build.outputs.sha256 }}"
          SIZE="${{ steps.build.outputs.size }}"
          DOWNLOAD_URL="${{ steps.release.outputs.download_url }}"
          IS_PRE="${{ steps.version.outputs.is_prerelease }}"
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          INDEX_FILE="${PROJECT_ID}.json"

          # Build new release entry
          NEW_ENTRY=$(python3 - <<PYEOF
          import json, sys

          new = {
              "version":          "${CV_VERSION}",
              "tag":              "${TAG}",
              "url":              "${DOWNLOAD_URL}",
              "checksum_sha256":  "${SHA256}",
              "size_bytes":       int("${SIZE}"),
              "is_prerelease":    "${IS_PRE}" == "true",
              "published_at":     "${NOW}",
              "universe_version": "${{ steps.version.outputs.universe_version }}",
          }

          # Load existing index or create fresh one
          try:
              with open("${INDEX_FILE}") as f:
                  idx = json.load(f)
          except FileNotFoundError:
              idx = {"project_id": "${PROJECT_ID}", "releases": []}

          # Remove any existing entry with the same version (idempotent)
          idx["releases"] = [r for r in idx["releases"] if r.get("version") != "${CV_VERSION}"]

          # Prepend newest release
          idx["releases"].insert(0, new)

          with open("${INDEX_FILE}", "w") as f:
              json.dump(idx, f, indent=2)
              f.write("\n")

          print(json.dumps(idx, indent=2))
          PYEOF
          )

          echo "Updated ${INDEX_FILE}:"
          cat "${INDEX_FILE}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${INDEX_FILE}"
          git diff --cached --quiet && echo "No changes to index" && exit 0
          git commit -m "index(${PROJECT_ID}): add ${CV_VERSION}"
          git push origin main
